name: Relax Sound Watchdog

on:
  schedule:
    # Runs every 2 hours — triggers bot if it missed a scheduled slot
    - cron: '30 */2 * * *'
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Check and trigger if needed
        run: |
          python3 - <<'EOF'
          import json, sys
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc)

          # Relax Sound posts at 06:00, 10:00, 14:00, 18:00 UTC
          # If last post is more than 5 hours ago → something was missed
          MAX_GAP_HOURS = 5

          try:
              with open("logs/uploaded.json") as f:
                  data = json.load(f)
              uploads = data.get("uploads", [])
              if not uploads:
                  print("No uploads — triggering")
                  sys.exit(1)

              last = uploads[-1]
              ts = last["timestamp"]
              last_dt = datetime.fromisoformat(ts.replace("Z", "+00:00"))
              age_hours = (now - last_dt).total_seconds() / 3600

              print(f"Last: {last.get('variant_id','?')} — {age_hours:.1f}h ago")

              if age_hours > MAX_GAP_HOURS:
                  print(f"GAP TOO LARGE ({age_hours:.1f}h > {MAX_GAP_HOURS}h) — triggering!")
                  sys.exit(1)
              else:
                  print("OK: recent post found")

          except Exception as e:
              print(f"ERROR: {e}")
              sys.exit(1)
          EOF

      - name: Trigger daily_post if missed
        if: failure()
        run: |
          echo "Watchdog triggering daily_post..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/daily_post.yml/dispatches" \
            -d '{"ref":"main"}')
          echo "Trigger status: $STATUS"
