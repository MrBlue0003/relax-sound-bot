name: Relax Sound Daily Post

on:
  schedule:
    # 4x/day: 06:00, 10:00, 14:00, 18:00 UTC = 09:00, 13:00, 17:00, 21:00 Bucharest (EEST)
    - cron: '0 6,10,14,18 * * *'
  workflow_dispatch:
    inputs:
      force_variant_id:
        description: 'Force a specific variant ID (e.g. crackling_fire). Leave empty for auto rotation.'
        required: false
        default: ''

concurrency:
  group: relax-sound-post
  cancel-in-progress: false   # queue, don't cancel — the second run posts normally after the first

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation
          ffmpeg -version | head -1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p logs assets output

      - name: Run bot
        env:
          PIXABAY_API_KEY:       ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CHANNEL_ID:    ${{ secrets.YOUTUBE_CHANNEL_ID }}
          UPLOAD_TIMEZONE:       Europe/Bucharest
          RS_VIDEO_DURATION:     59
          FORCE_VARIANT_ID:      ${{ github.event.inputs.force_variant_id }}
        run: python main.py

      - name: Save upload log to repo
        if: success()
        run: |
          git config user.email "relaxsound-bot@github.com"
          git config user.name "Relax Sound Bot"
          python scripts/save_log.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
